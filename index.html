      border-bottom: 1px solid #1a1a1a;
      color: #f0f0f0;
      text-decoration: none;
      transition: color 0.15s;
    }

    .link:first-child {
      border-top: 1px solid #1a1a1a;
    }

    .link:hover {
      color: #fff;
    }

    .link:hover .arrow {
      opacity: 1;
    }

    .link-name {
      letter-spacing: 4px;
      font-size: 15px;
    }

    .arrow {
      color: #333;
      font-size: 13px;
      opacity: 0;
      transition: opacity 0.15s;
    }

    .foot {
      font-size: 10px;
      color: #222;
      letter-spacing: 3px;
